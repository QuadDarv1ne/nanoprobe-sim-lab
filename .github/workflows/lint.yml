name: Lint

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black mypy

    - name: Run flake8
      run: |
        flake8 src/ utils/ components/ --max-line-length=100 --ignore=E203,W503

    - name: Run black (check only)
      run: |
        black --check src/ utils/ components/ --line-length 100

    - name: Run mypy
      run: |
        mypy src/ utils/ --ignore-missing-imports || true

    - name: Run mypy --strict (core modules only)
      run: |
        # Строгая проверка для ключевых модулей
        mypy --strict \
          utils/database.py \
          utils/core/ \
          utils/config/ \
          utils/data/ \
          --ignore-missing-imports \
          --warn-return-any \
          --warn-unused-configs \
          --warn-redundant-casts \
          --warn-unused-ignores \
          || true
