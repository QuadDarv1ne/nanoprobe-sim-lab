# Nginx Production Configuration
# Nanoprobe Sim Lab

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ==================== Logging ====================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ==================== Performance ====================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ==================== Rate Limiting ====================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ==================== Security Headers ====================
    map $sent_http_content_type $security_headers {
        ~*text/html "X-Frame-Options \"SAMEORIGIN\"; X-Content-Type-Options \"nosniff\"; X-XSS-Protection \"1; mode=block\"; Referrer-Policy \"strict-origin-when-cross-origin\"";
        ~*application/json "X-Content-Type-Options \"nosniff\"";
        default "";
    }

    # ==================== Upstreams ====================
    upstream fastapi {
        least_conn;
        server fastapi:8000;
        keepalive 32;
    }

    upstream flask {
        server flask:5000;
        keepalive 16;
    }

    upstream nextjs {
        server nextjs:3000;
        keepalive 16;
    }

    # ==================== Main Server ====================
    server {
        listen 80;
        server_name _;

        # Security: Hide nginx version
        server_tokens off;

        # Client body size
        client_max_body_size 50M;

        # ==================== API Routes ====================
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://fastapi;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;

            add_header $security_headers always;
        }

        # ==================== Auth Routes (strict rate limit) ====================
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://fastapi;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header $security_headers always;
        }

        # ==================== WebSocket Routes ====================
        location /ws/ {
            proxy_pass http://fastapi;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ==================== Flask Frontend ====================
        location /flask/ {
            rewrite ^/flask/(.*) /$1 break;
            proxy_pass http://flask;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header $security_headers always;
        }

        # ==================== Next.js Frontend ====================
        location / {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
                proxy_pass http://nextjs;
                proxy_cache_valid 200 30d;
                add_header Cache-Control "public, max-age=2592000, immutable";
            }

            add_header $security_headers always;
        }

        # ==================== Health Check ====================
        location /health {
            access_log off;
            proxy_pass http://fastapi/health;
        }

        # ==================== Metrics (internal only) ====================
        location /metrics {
            allow 127.0.0.1;
            allow 172.28.0.0/16;
            deny all;

            proxy_pass http://fastapi/metrics;
        }

        # ==================== Security: Deny hidden files ====================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # ==================== Monitoring Server (internal) ====================
    server {
        listen 8080;
        server_name localhost;

        location /nginx_status {
            stub_status on;
            allow 127.0.0.1;
            allow 172.28.0.0/16;
            deny all;
        }
    }
}
