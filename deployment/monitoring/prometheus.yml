# Prometheus конфигурация для Nanoprobe Simulation Lab

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Правила алертов
rule_files:
  # - "alerts/*.yml"

# Цели для сбора метрик
scrape_configs:
  # Основное приложение
  - job_name: 'nanoprobe-lab'
    static_configs:
      - targets: ['nanoprobe-lab:5000']
    metrics_path: '/api/metrics'
    scrape_interval: 10s

  # Prometheus сам себя
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node exporter (системные метрики)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

# Настройки удаленного хранения (опционально)
# remote_write:
#   - url: "http://remote-storage:9201/write"
