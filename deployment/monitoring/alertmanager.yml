# Alertmanager конфигурация для Nanoprobe Simulation Lab
# Сохранить как: deployment/monitoring/alertmanager.yml

global:
  resolve_timeout: 5m
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alertmanager@nanoprobe-lab.local'
  smtp_auth_username: 'alertmanager@nanoprobe-lab.local'
  smtp_auth_password: '${SMTP_PASSWORD}'

# Шаблоны уведомлений
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Маршрутизация алертов
route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-receiver'

  # Дочерние маршруты для разных уровней серьёзности
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      continue: true

    - match:
        severity: warning
      receiver: 'warning-receiver'

    - match:
        severity: info
      receiver: 'info-receiver'

# Получатели уведомлений
receivers:
  # Получатель по умолчанию (логи)
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://localhost:5001/alerts'
        send_resolved: true

  # Критические алерты - Telegram + Email + PagerDuty
  - name: 'critical-receiver'
    telegram_configs:
      - bot_token: '${TELEGRAM_BOT_TOKEN}'
        chat_id: '${TELEGRAM_CHAT_ID}'
        send_resolved: true
        message: |
          🚨 *Critical Alert*
          *Alert:* {{ .GroupLabels.alertname }}
          *Severity:* {{ .GroupLabels.severity }}
          *Description:* {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
          *Time:* {{ .StartsAt.Format "2006-01-02 15:04:05" }}

    email_configs:
      - to: 'admin@nanoprobe-lab.local'
        send_resolved: true
        html: true
        headers:
          Subject: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'

    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY}'
        send_resolved: true

  # Warning алерты - Telegram + Email
  - name: 'warning-receiver'
    telegram_configs:
      - bot_token: '${TELEGRAM_BOT_TOKEN}'
        chat_id: '${TELEGRAM_CHAT_ID}'
        send_resolved: true
        message: |
          ⚠️ *Warning Alert*
          *Alert:* {{ .GroupLabels.alertname }}
          *Severity:* {{ .GroupLabels.severity }}
          *Description:* {{ range .Alerts }}{{ .Annotations.description }}{{ end }}

    email_configs:
      - to: 'admin@nanoprobe-lab.local'
        send_resolved: true

  # Info алерты - только логи
  - name: 'info-receiver'
    webhook_configs:
      - url: 'http://localhost:5001/alerts'
        send_resolved: true

# Подавление алертов (inhibition rules)
inhibit_rules:
  # Если сервис down, не показывать связанные алерты
  - source_match:
      alertname: 'ServiceDown'
    target_match:
      severity: 'warning'
    equal: ['alertname']

  # Если critical, не показывать warning для того же алерта
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
