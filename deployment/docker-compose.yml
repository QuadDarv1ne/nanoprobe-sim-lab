version: '3.8'

services:
  # Основной сервис приложения
  nanoprobe-lab:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: nanoprobe-simulation-lab
    ports:
      - "5000:5000"   # Веб-панель
      - "8000:8000"   # API
      - "8080:8080"   # Альтернативный порт
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../output:/app/output
      - ../reports:/app/reports
      - ../config:/app/config
    env_file:
      - ../.env
    environment:
      - PYTHONPATH=/app
      - FLASK_ENV=production
      - DATABASE_PATH=/app/data/nanoprobe.db
      - APP_DEBUG=false
    restart: unless-stopped
    networks:
      - nanoprobe-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api/status', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # База данных (опционально для будущего расширения)
  postgres:
    image: postgres:15-alpine
    container_name: nanoprobe-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=nanoprobe
      - POSTGRES_USER=nanoprobe
      - POSTGRES_PASSWORD=nanoprobe_password
    networks:
      - nanoprobe-network
    profiles:
      - with-postgres

  # Мониторинг (Prometheus)
  prometheus:
    image: prom/prometheus:latest
    container_name: nanoprobe-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - nanoprobe-network
    depends_on:
      - nanoprobe-lab
    profiles:
      - monitoring

  # Визуализация (Grafana)
  grafana:
    image: grafana/grafana:latest
    container_name: nanoprobe-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - nanoprobe-network
    depends_on:
      - prometheus
    profiles:
      - monitoring

  # Redis для кэширования (опционально)
  redis:
    image: redis:7-alpine
    container_name: nanoprobe-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - nanoprobe-network
    profiles:
      - with-redis

networks:
  nanoprobe-network:
    driver: bridge

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
  redis-data:
  nanoprobe-data:
  nanoprobe-logs:
  nanoprobe-output:
